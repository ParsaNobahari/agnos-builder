name: proxy-tests
on:
  push:
  pull_request:

jobs:
  precommit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11.4'
    - run: "echo $http_proxy"
    - run: "echo $https_proxy"
    - run: "echo $HTTP_PROXY"
    - run: "echo $HTTPS_PROXY"
    - run: "echo $no_proxy"
    - run: "echo $NO_PROXY"
